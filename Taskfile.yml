# yaml-language-server: $schema=https://taskfile.dev/schema.json

version: "3"

vars:
  date:
    sh: date -u +"%Y%m%d"

tasks:
  default: task -l

  init:
    desc: Initialize the project
    cmds:
      - task: init:hugo
      - task: init:git

  init:hugo:
    desc: Install hugo
    status:
      - test -f /opt/homebrew/bin/hugo
    platforms:
      - darwin
    cmds:
      - brew install hugo

  init:git:
    desc: Init git submodule and update
    status:
      - test -d themes/hugo-profile/.github
    cmds:
      - git submodule update --init --recursive

  git:update:
    desc: Update git repository
    aliases:
      - update
    cmds:
      - git pull --recurse-submodules=yes

  build:
    desc: Build the site
    cmds:
      - hugo --gc

  serve:
    desc: Serve the site
    cmd: |
      open http://localhost:1313/
      hugo serve --buildDrafts --buildFuture
